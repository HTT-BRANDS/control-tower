# =============================================================================
# Arbiter Verification Policy — Control Tower production releases
# =============================================================================
# Single source of truth for the supply-chain verification claims enforced in
# .github/workflows/deploy-production.yml before any production deploy.
#
# When an operator or auditor asks "what exactly does the deploy gate check?"
# this file is the answer — the workflow steps are the executable mirror.
#
# Filed in response to release-gate arbiter verdict
# rga-2026-04-22-azgov-v2.5.0-02 (Finding 4, P0 Security #1 + #2).
# =============================================================================

apiVersion: arbiter.htt.dev/v1
kind: VerificationPolicy
metadata:
  name: control-tower-production-attestations
  repository: htt-brands/control-tower
  bd_ticket: "7mk8"
  created: "2026-04-22"
  updated: "2026-04-24"

spec:
  # ---------------------------------------------------------------------------
  # The 4 claims every attestation must satisfy, in order of verification cost
  # (cheapest first — fail fast on the pure-string checks before crypto).
  # ---------------------------------------------------------------------------
  claims:

    subject:
      # Claim 1 — WHAT artifact.
      # MUST be an immutable content-addressed digest. Never a tag. The deploy
      # workflow pulls this from the build-image job's image_digest output,
      # which in turn comes from docker buildx's --metadata-file.
      description: "Image is pinned by content-addressed digest, not by tag."
      pin: "by-digest"
      format: "sha256:<64-hex>"

    predicate_type:
      # Claim 2 — WHAT KIND of attestation.
      # Both predicates are REQUIRED on every production image. Absence of
      # either fails the gate closed.
      description: "Both SLSA v1 provenance and SPDX SBOM must be attached."
      required:
        - type: "https://slsa.dev/provenance/v1"
          spec: "https://slsa.dev/provenance/v1"
          produced_by: "actions/attest-build-provenance@e8998f94 (v2.4.0)"
        - type: "https://spdx.dev/Document/v2.3"
          spec: "https://spdx.dev/spdx-specification-2-3/"
          produced_by: "actions/attest-sbom@bd218ad0 (v2.4.0, syft-generated)"

    certificate_identity:
      # Claim 3 — WHICH workflow produced it.
      # GitHub Attestations verification pins the exact workflow path via
      # --signer-workflow, which is easier to reason about than a SAN regexp.
      description: "Exact workflow path that signed the attestation."
      mode: "exact-workflow"
      value: "htt-brands/control-tower/.github/workflows/deploy-production.yml"

    source_ref:
      # Claim 4 — WHICH ref the workflow ran from.
      # The deploy workflow only accepts attestations from main or release/*.
      # Verification passes the current GITHUB_REF explicitly, and the shell
      # gate fails closed on any unsupported ref before attestation lookup.
      description: "Git ref of the signer workflow run."
      mode: "exact-runtime-ref"
      allowed_patterns:
        - "refs/heads/main"
        - "refs/heads/release/*"

    certificate_oidc_issuer:
      # Claim 5 — WHO vouched for the identity.
      # gh attestation verify still enforces the OIDC issuer explicitly so the
      # policy remains auditor-readable and tool-agnostic at the claim level.
      description: "Sigstore Fulcio OIDC issuer for GitHub Actions."
      mode: "exact"
      value: "https://token.actions.githubusercontent.com"

  # ---------------------------------------------------------------------------
  # Where/how this policy is enforced. Arbiter pre-flight cross-checks that
  # the workflow actually implements every claim below — if this block gets
  # out of sync with the workflow, pre-flight fails before submission.
  # ---------------------------------------------------------------------------
  enforcement:
    mode: "blocking"  # fail closed; never skip on verify error
    verification_method: "github-attestations-api"
    verification_tool: "gh attestation verify"
    evidence_artifacts:
      - "/tmp/slsa-verdict.json"
      - "/tmp/sbom-verdict.json"
      - "artifact:attestation-verdicts-${github.run_id}"
    applies_to:
      - workflow: ".github/workflows/deploy-production.yml"
        job: "deploy"
        gate_steps:
          - "Verify SLSA provenance attestation"
          - "Verify SBOM attestation"
          - "Upload attestation verification evidence"
    produced_by:
      - workflow: ".github/workflows/deploy-production.yml"
        job: "build-image"
        produce_steps:
          - "Attest SBOM (Sigstore keyless → OCI referrer)"
          - "Attest SLSA build provenance (SLSA v1 / Build L3)"

  # ---------------------------------------------------------------------------
  # SLSA Build Level 3 conformance rationale.
  # Cited so future auditors don't have to reconstruct the argument.
  # ---------------------------------------------------------------------------
  slsa_level: "L3"
  slsa_rationale:
    - "Build platform: GitHub-hosted ephemeral runner (ubuntu-latest) —
       untampered, isolated per job, destroyed after run."
    - "Builder identity: workflow-scoped ephemeral OIDC token minted by
       GitHub — cannot be forged off-platform or by a different workflow."
    - "Provenance authenticity: Fulcio short-lived X.509 cert bound to the
       OIDC identity, logged in Rekor transparency log."
    - "Non-falsifiable: gh attestation verify checks the signed attestation
       bundle, Fulcio-backed cert chain, and timestamped transparency evidence
       before any claim is trusted."
    - "Deterministic verification path: GitHub Attestations API is queried
       directly during deploy instead of waiting for GHCR OCI referrer
       discoverability to converge."
    - "Isolated: no user-controlled inputs alter the provenance-generation
       action's behavior (push-to-registry toggle only)."

  # ---------------------------------------------------------------------------
  # Known gaps / ratchet targets. Arbiter should flag these if unaddressed
  # after their respective deadlines.
  # ---------------------------------------------------------------------------
  ratchet_followups:
    - id: "7mk8-sha-pin"
      description: "DONE (bd dq49, 2026-04-23). All supply-chain tooling now
                    pinned to full commit SHAs: attest-build-provenance=e8998f94,
                    attest-sbom=bd218ad0, cosign-installer=7e8b541e, sbom-action=
                    e22c3899. Dependabot will propose SHA-updating PRs on new
                    releases."
      severity: "resolved"
      deadline: "2026-07-21"
      resolved_by: "bd dq49"
    - id: "7mk8-gh-attestation-api"
      description: "DONE (bd g1cc, 2026-04-24). Deploy verification now uses
                    gh attestation verify against GitHub's attestation API,
                    preserving the same signed-bundle checks while removing
                    GHCR OCI-referrer propagation flakiness from the release path."
      severity: "resolved"
      deadline: null
      resolved_by: "bd g1cc"
    - id: "7mk8-rekor-offline"
      description: "If release verification ever has to run in an air-gapped
                    environment, export attestation bundles ahead of time and
                    document an offline verification path. N/A today because
                    GitHub Actions and Azure App Service both have public egress."
      severity: "info"
      deadline: null
