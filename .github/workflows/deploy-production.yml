# =============================================================================
# Azure Governance Platform - Production Deployment Pipeline (GHCR)
# =============================================================================
# Trigger: Manual workflow_dispatch only (requires explicit approval)
#          Tags matching v*.*.* also auto-trigger for hotfixes.
#
# Pipeline stages:
#   1. QA Gate       — lint + full test suite (hard gate)
#   2. Security Scan — Trivy + pip-audit
#   3. Build Image   — docker build → GHCR as :latest + :sha-* (uses GITHUB_TOKEN)
#   4. Deploy        — az webapp config container set + restart (requires prod environment approval)
#   5. Smoke Test    — health + auth wall checks against production URL
#   6. Notify        — Teams webhook on success/failure
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID           — OIDC federated credential
#   AZURE_TENANT_ID           — HTT-CORE tenant
#   AZURE_SUBSCRIPTION_ID     — target subscription
#   PRODUCTION_TEAMS_WEBHOOK  — deployment notification webhook
#
# Required GitHub Environments:
#   production  — with required reviewers configured
# =============================================================================

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason (shown in Teams notification)'
        required: true
        type: string
      skip_tests:
        description: 'Skip unit tests (emergency hotfix only — requires justification)'
        required: false
        default: false
        type: boolean
  # NOTE: Tag push trigger removed — no OIDC federated credential covers
  # tag refs. Use workflow_dispatch for production deploys.

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION:     '0.5.x'
  # GHCR Configuration — free for public repos, uses GITHUB_TOKEN
  GHCR_REGISTRY:    ghcr.io
  GHCR_REPOSITORY:  htt-brands/azure-governance-platform
  IMAGE_TAG:        latest
  # Production App Service (populated after infra deploy)
  AZURE_APP_NAME:       app-governance-prod
  AZURE_RESOURCE_GROUP: rg-governance-production
  PRODUCTION_URL:       https://app-governance-prod.azurewebsites.net

permissions:
  id-token: write
  contents: read
  security-events: write
  packages: write  # GHCR push

jobs:
  # ===========================================================================
  # Job 1: QA Gate
  # ===========================================================================
  qa-gate:
    name: QA Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}-v2

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Create CI tenant config
        run: |
          # Create tenants.yaml with OIDC enabled for CI testing
          cat > config/tenants.yaml << 'EOF'
          tenants:
            HTT:
              name: "Head-To-Toe (HTT)"
              code: "HTT"
              tenant_id: "00000000-0000-0000-a000-000000000001"
              app_id: "00000000-0000-0000-b000-000000000001"
              admin_email: "admin@example.com"
              domains:
                - "example.com"
              is_active: true
              is_riverside: true
              priority: 1
              oidc_enabled: true
            BCC:
              name: "Bishops (BCC)"
              code: "BCC"
              tenant_id: "00000000-0000-0000-a000-000000000002"
              app_id: "00000000-0000-0000-b000-000000000002"
              admin_email: "admin@example.com"
              domains:
                - "example.com"
              is_active: true
              is_riverside: true
              priority: 2
              oidc_enabled: true
            FN:
              name: "Frenchies (FN)"
              code: "FN"
              tenant_id: "00000000-0000-0000-a000-000000000003"
              app_id: "00000000-0000-0000-b000-000000000003"
              admin_email: "admin@example.com"
              domains:
                - "example.com"
              is_active: true
              is_riverside: true
              priority: 3
              oidc_enabled: true
            TLL:
              name: "Lash Lounge (TLL)"
              code: "TLL"
              tenant_id: "00000000-0000-0000-a000-000000000004"
              app_id: "00000000-0000-0000-b000-000000000004"
              admin_email: "admin@example.com"
              domains:
                - "example.com"
              is_active: true
              is_riverside: true
              priority: 4
              oidc_enabled: true
            DCE:
              name: "Delta Crown Extensions (DCE)"
              code: "DCE"
              tenant_id: "00000000-0000-0000-a000-000000000005"
              app_id: "00000000-0000-0000-b000-000000000005"
              admin_email: "admin@example.com"
              domains:
                - "example.com"
              is_active: true
              is_riverside: true
              priority: 5
              oidc_enabled: true
          EOF
          echo "Created config/tenants.yaml with OIDC enabled for all tenants"

      - name: Full test suite
        if: ${{ !inputs.skip_tests }}
        run: uv run pytest tests/unit/ tests/integration/ -q --tb=short
        env:
          ENVIRONMENT: development
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  # ===========================================================================
  # Job 2: Security Scan
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: qa-gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3

      - name: Trivy filesystem scan (table — debug)
        run: |
          trivy fs . \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignorefile .trivyignore \
            --format table \
            --exit-code 1
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: 'fs'
          scan-ref:  '.'
          format:    'sarif'
          output:    'trivy-fs.sarif'
          severity:  'CRITICAL,HIGH'
          exit-code: '0'
          trivyignores: '.trivyignore'
          scanners: 'vuln'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem-production

      - name: pip-audit (no known CVEs)
        run: |
          # Export locked deps (no hashes — pip-audit doesn't support them)
          uv export --no-hashes --no-dev > /tmp/requirements.txt
          pip install pip-audit
          pip-audit -r /tmp/requirements.txt --desc --format=json --output=pip-audit.json
          # Fail if any CVE found
          python -c "
          import json, sys
          data = json.load(open('pip-audit.json'))
          vulns = [v for pkg in data.get('dependencies', []) for v in pkg.get('vulns', [])]
          if vulns:
              print(f'FAIL: {len(vulns)} known CVEs found')
              sys.exit(1)
          print('PASS: No known CVEs')
          "

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-production
          path: pip-audit.json

  # ===========================================================================
  # Job 3: Build Image → GHCR
  # Builds and pushes to GitHub Container Registry using GITHUB_TOKEN
  # ===========================================================================
  build-image:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [qa-gate, security-scan]
    environment: production

    outputs:
      image_full: ${{ steps.set-output.outputs.image_full }}
      sha_tag:    ${{ steps.set-output.outputs.sha_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build-push
        run: |
          SHA_TAG="sha-${{ github.sha }}"
          
          # Build and push using docker CLI for better control.
          # --metadata-file captures the pushed manifest digest so the
          # a1sb guard (next step) can verify the immutable digest rather
          # than a mutable tag. Matches the pattern used by the other two
          # prod-reachable workflows which rely on docker/build-push-action's
          # `outputs.digest` value.
          docker buildx build \
            --platform linux/amd64 \
            --target production \
            --tag ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${SHA_TAG} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --metadata-file /tmp/buildx-meta.json \
            --push \
            .
          
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_ENV
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT

      # Extract the content-addressed digest from buildx's metadata file.
      # Using the digest (immutable) instead of a tag (mutable) means the
      # guard cannot be fooled by a racy retag between push and verify.
      - name: Extract image digest
        id: digest
        run: |
          set -euo pipefail
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/buildx-meta.json)
          if [[ -z "$DIGEST" || "$DIGEST" == "null" ]]; then
            echo "::error::Failed to extract digest from buildx metadata"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Extracted digest: ${DIGEST}"

      # Regression guard for incident a1sb (libodbc missing in dev image
      # shipped to prod). Verifies the exact manifest we just pushed by
      # digest, not by a mutable tag.
      # See .github/actions/verify-production-image/README.md
      - name: Verify production image (a1sb guard)
        uses: ./.github/actions/verify-production-image
        with:
          image-ref: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}@${{ steps.digest.outputs.digest }}

      - name: Set image output
        id: set-output
        run: |
          IMAGE_FULL="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          SHA_TAG="sha-${{ github.sha }}"
          echo "image_full=${IMAGE_FULL}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "Built: ${IMAGE_FULL}"

  # ===========================================================================
  # Job 4: Deploy — requires Production environment approval
  # ===========================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-image
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set subscription context
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update container image and restart App Service
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pass GHCR credentials so App Service can pull the (internal) image.
          # Prefer GHCR_PAT (a long-lived PAT with read:packages scope) over
          # GITHUB_TOKEN, which expires after the workflow ends. Without a PAT,
          # App Service restarts outside CI may fail to re-pull the image.
          GHCR_PASSWORD="${GHCR_PAT:-$GITHUB_TOKEN}"
          az webapp config container set \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --container-image-name ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ needs.build-image.outputs.sha_tag }} \
            --container-registry-url https://${{ env.GHCR_REGISTRY }} \
            --container-registry-user ${{ github.repository_owner }} \
            --container-registry-password "$GHCR_PASSWORD"
          az webapp restart \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

      - name: Wait for startup (120s — allows migrations to run)
        run: sleep 120

      - name: Health gate
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -sf ${{ env.PRODUCTION_URL }}/health -w "%{http_code}" -o /dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Health check failed (HTTP $STATUS), retrying in 30s..."
            sleep 30
          done
          echo "❌ Health check failed after 3 attempts"
          exit 1

  # ===========================================================================
  # Job 5: Smoke Tests
  # ===========================================================================
  smoke-test:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run production smoke tests
        run: |
          uv run pytest tests/staging/test_smoke.py tests/staging/test_security.py \
            -v --tb=short \
            --staging-url="${{ env.PRODUCTION_URL }}"
        env:
          STAGING_URL: ${{ env.PRODUCTION_URL }}
          # Tests only make HTTP requests to the live URL; ENVIRONMENT=development
          # prevents Settings() from requiring CORS_ORIGINS during import.
          ENVIRONMENT: development

  # ===========================================================================
  # Job 6: Notify via Teams
  # ===========================================================================
  notify:
    name: Notify Teams
    runs-on: ubuntu-latest
    needs: [build-image, deploy, smoke-test]
    if: always()

    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ] && [ "${{ needs.smoke-test.result }}" = "success" ]; then
            echo "color=00a86b" >> $GITHUB_OUTPUT
            echo "title=✅ Production Deployment Succeeded" >> $GITHUB_OUTPUT
          else
            echo "color=d32f2f" >> $GITHUB_OUTPUT
            echo "title=❌ Production Deployment Failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Teams notification
        if: ${{ vars.TEAMS_WEBHOOK_CONFIGURED == 'true' }}
        run: |
          REASON="${{ inputs.reason || github.ref_name }}"
          curl -X POST "${{ secrets.PRODUCTION_TEAMS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"themeColor\": \"${{ steps.status.outputs.color }}\",
              \"title\": \"${{ steps.status.outputs.title }}\",
              \"text\": \"**Image**: ${{ needs.build-image.outputs.sha_tag }}<br>**Reason**: ${REASON}<br>**Deployed by**: ${{ github.actor }}<br>**Commit**: ${{ github.sha }}\",
              \"potentialAction\": [{
                \"@type\": \"OpenUri\",
                \"name\": \"View Run\",
                \"targets\": [{\"os\": \"default\", \"uri\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]
              }]
            }" || true
