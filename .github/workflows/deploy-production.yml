# =============================================================================
# Azure Governance Platform - Production Deployment Pipeline
# =============================================================================
# Trigger: Manual workflow_dispatch only (requires explicit approval)
#          Tags matching v*.*.* also auto-trigger for hotfixes.
#
# Pipeline stages:
#   1. QA Gate       — lint + full test suite (hard gate)
#   2. Security Scan — Trivy + pip-audit
#   3. Build Image   — az acr build → production ACR as :latest + :sha-*
#   4. Deploy        — az webapp restart (requires prod environment approval)
#   5. Smoke Test    — health + auth wall checks against production URL
#   6. Notify        — Teams webhook on success/failure
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID           — OIDC federated credential
#   AZURE_TENANT_ID           — HTT-CORE tenant
#   AZURE_SUBSCRIPTION_ID     — target subscription
#   PRODUCTION_TEAMS_WEBHOOK  — deployment notification webhook
#
# Required GitHub Environments:
#   production  — with required reviewers configured
# =============================================================================

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason (shown in Teams notification)'
        required: true
        type: string
      skip_tests:
        description: 'Skip unit tests (emergency hotfix only — requires justification)'
        required: false
        default: 'false'
        type: boolean
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  PYTHON_VERSION: '3.11'
  UV_VERSION:     '0.5.x'
  # Production ACR
  ACR_NAME:         acrgovprod
  ACR_LOGIN_SERVER: acrgovprod.azurecr.io
  IMAGE_REPO:       azure-governance-platform
  IMAGE_TAG:        latest
  # Production App Service (populated after infra deploy)
  AZURE_APP_NAME:       app-governance-production
  AZURE_RESOURCE_GROUP: rg-governance-production
  PRODUCTION_URL:       https://app-governance-production.azurewebsites.net

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  # ===========================================================================
  # Job 1: QA Gate
  # ===========================================================================
  qa-gate:
    name: QA Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}-v2

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Full test suite
        if: ${{ inputs.skip_tests != 'true' }}
        run: uv run pytest tests/unit/ tests/integration/ -q --tb=short
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  # ===========================================================================
  # Job 2: Security Scan
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: qa-gate

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref:  '.'
          format:    'sarif'
          output:    'trivy-fs.sarif'
          severity:  'CRITICAL,HIGH'
          exit-code: '1'   # HARD GATE in production — fail on CRITICAL/HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem-production

      - name: pip-audit (no known CVEs)
        run: |
          pip install pip-audit
          pip-audit --desc --format=json --output=pip-audit.json
          # Fail if any CVE found
          python -c "
          import json, sys
          data = json.load(open('pip-audit.json'))
          vulns = [v for pkg in data.get('dependencies', []) for v in pkg.get('vulns', [])]
          if vulns:
              print(f'FAIL: {len(vulns)} known CVEs found')
              sys.exit(1)
          print('PASS: No known CVEs')
          "

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-production
          path: pip-audit.json

  # ===========================================================================
  # Job 3: Build Image → Production ACR
  # ===========================================================================
  build-image:
    name: Build & Push to Production ACR
    runs-on: ubuntu-latest
    needs: [qa-gate, security-scan]
    # Environment required so OIDC subject matches the environment-prod
    # federated credential on tag pushes (Azure AD doesn't support wildcards)
    environment: production

    outputs:
      image_full: ${{ steps.set-output.outputs.image_full }}
      sha_tag:    ${{ steps.set-output.outputs.sha_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set subscription context
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image via ACR Tasks
        run: |
          SHA_TAG="sha-${{ github.sha }}"
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}" \
            --image "${{ env.IMAGE_REPO }}:${SHA_TAG}" \
            --platform linux/amd64 \
            --file Dockerfile \
            .
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_ENV

      - name: Set image output
        id: set-output
        run: |
          IMAGE_FULL="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}"
          SHA_TAG="sha-${{ github.sha }}"
          echo "image_full=${IMAGE_FULL}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "Built: ${IMAGE_FULL}"

  # ===========================================================================
  # Job 4: Deploy — requires Production environment approval
  # ===========================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-image
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set subscription context
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Restart App Service (pulls new :latest image)
        run: |
          az webapp restart \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

      - name: Wait for startup (120s — allows migrations to run)
        run: sleep 120

      - name: Health gate
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -sf ${{ env.PRODUCTION_URL }}/health -w "%{http_code}" -o /dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Health check failed (HTTP $STATUS), retrying in 30s..."
            sleep 30
          done
          echo "❌ Health check failed after 3 attempts"
          exit 1

  # ===========================================================================
  # Job 5: Smoke Tests
  # ===========================================================================
  smoke-test:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run production smoke tests
        run: |
          uv run pytest tests/staging/test_smoke.py tests/staging/test_security.py \
            -v --tb=short \
            --staging-url="${{ env.PRODUCTION_URL }}"
        env:
          STAGING_URL: ${{ env.PRODUCTION_URL }}

  # ===========================================================================
  # Job 6: Notify via Teams
  # ===========================================================================
  notify:
    name: Notify Teams
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always()

    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ] && [ "${{ needs.smoke-test.result }}" = "success" ]; then
            echo "color=00a86b" >> $GITHUB_OUTPUT
            echo "title=✅ Production Deployment Succeeded" >> $GITHUB_OUTPUT
          else
            echo "color=d32f2f" >> $GITHUB_OUTPUT
            echo "title=❌ Production Deployment Failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Teams notification
        if: secrets.PRODUCTION_TEAMS_WEBHOOK != ''
        run: |
          REASON="${{ inputs.reason || github.ref_name }}"
          curl -X POST "${{ secrets.PRODUCTION_TEAMS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"themeColor\": \"${{ steps.status.outputs.color }}\",
              \"title\": \"${{ steps.status.outputs.title }}\",
              \"text\": \"**Image**: ${{ needs.build-image.outputs.sha_tag }}<br>**Reason**: ${REASON}<br>**Deployed by**: ${{ github.actor }}<br>**Commit**: ${{ github.sha }}\",
              \"potentialAction\": [{
                \"@type\": \"OpenUri\",
                \"name\": \"View Run\",
                \"targets\": [{\"os\": \"default\", \"uri\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]
              }]
            }" || true
