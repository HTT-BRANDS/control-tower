# =============================================================================
# Azure Governance Platform - Staging Deployment Pipeline (GHCR)
# =============================================================================
# Trigger: Pushes to 'main' branch or manual workflow_dispatch
#
# Pipeline stages:
#   1. QA Gate       — lint + full unit/integration test suite (hard gate)
#   2. Security Scan — Trivy filesystem + pip-audit
#   3. Build Image   — docker build → GHCR (uses GITHUB_TOKEN)
#   4. Deploy        — az webapp restart picks up new :staging tag
#   5. Validation    — pytest staging suite against live URL
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID        — OIDC federated credential
#   AZURE_TENANT_ID        — HTT-CORE tenant
#   AZURE_SUBSCRIPTION_ID  — 32a28177-6fb2-4668-a528-6d6cafb9665e
# =============================================================================

name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip unit tests (emergency deploy only)'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION:     '0.5.x'
  # GHCR Configuration — free for public repos, uses GITHUB_TOKEN
  GHCR_REGISTRY:    ghcr.io
  GHCR_REPOSITORY:  htt-brands/azure-governance-platform
  IMAGE_TAG:        staging
  # App Service — actual resource names (verified 2026-03-18)
  AZURE_APP_NAME:       app-governance-staging-xnczpwyv
  AZURE_RESOURCE_GROUP: rg-governance-staging
  STAGING_URL:          https://app-governance-staging-xnczpwyv.azurewebsites.net

permissions:
  id-token: write        # OIDC login
  contents: read
  security-events: write # Trivy SARIF upload
  packages: write        # GHCR push

jobs:
  # ===========================================================================
  # Job 1: QA Gate — hard gate, no continue-on-error
  # ===========================================================================
  qa-gate:
    name: QA Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}-v2

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Create CI tenant config
        run: |
          # Create tenants.yaml with OIDC enabled for CI testing
          cat > config/tenants.yaml << 'EOF'
          tenants:
            HTT:
              name: "Head-To-Toe (HTT)"
              code: "HTT"
              tenant_id: "00000000-0000-0000-a000-000000000001"
              app_id: "00000000-0000-0000-b000-000000000001"
              admin_email: "admin@example.com"
              domains:
                - "example.com"
              is_active: true
              is_riverside: true
              priority: 1
              oidc_enabled: true
            BCC:
              name: "Bishops (BCC)"
              code: "BCC"
              tenant_id: "00000000-0000-0000-a000-000000000002"
              app_id: "00000000-0000-0000-b000-000000000002"
              admin_email: "admin@example.com"
              domains:
                - "example.com"
              is_active: true
              is_riverside: true
              priority: 2
              oidc_enabled: true
            FN:
              name: "Frenchies (FN)"
              code: "FN"
              tenant_id: "00000000-0000-0000-a000-000000000003"
              app_id: "00000000-0000-0000-b000-000000000003"
              admin_email: "admin@example.com"
              domains:
                - "example.com"
              is_active: true
              is_riverside: true
              priority: 3
              oidc_enabled: true
            TLL:
              name: "Lash Lounge (TLL)"
              code: "TLL"
              tenant_id: "00000000-0000-0000-a000-000000000004"
              app_id: "00000000-0000-0000-b000-000000000004"
              admin_email: "admin@example.com"
              domains:
                - "example.com"
              is_active: true
              is_riverside: true
              priority: 4
              oidc_enabled: true
            DCE:
              name: "Delta Crown Extensions (DCE)"
              code: "DCE"
              tenant_id: "00000000-0000-0000-a000-000000000005"
              app_id: "00000000-0000-0000-b000-000000000005"
              admin_email: "admin@example.com"
              domains:
                - "example.com"
              is_active: true
              is_riverside: true
              priority: 5
              oidc_enabled: true
          EOF
          echo "Created config/tenants.yaml with OIDC enabled for all tenants"

      - name: Unit + integration tests
        if: ${{ inputs.skip_tests != 'true' }}
        run: uv run pytest tests/unit/ tests/integration/ -q --tb=short
        env:
          ENVIRONMENT: development
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  # ===========================================================================
  # Job 2: Security Scan
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: qa-gate

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref:  '.'
          format:    'sarif'
          output:    'trivy-fs.sarif'
          severity:  'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category:   trivy-filesystem-staging

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: pip-audit
        run: |
          # Export locked deps (no hashes — pip-audit doesn't support them)
          uv export --no-hashes --no-dev > /tmp/requirements.txt
          pip install pip-audit
          pip-audit -r /tmp/requirements.txt --desc --format=json --output=pip-audit.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-staging
          path: pip-audit.json

  # ===========================================================================
  # Job 3: Build Docker Image → GHCR
  # Builds and pushes to GitHub Container Registry using GITHUB_TOKEN
  # ===========================================================================
  build-image:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [qa-gate, security-scan]
    environment: staging

    outputs:
      image_full: ${{ steps.set-output.outputs.image_full }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:sha-${{ github.sha }}
          target: production
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Regression guard for incident a1sb (libodbc missing in dev image
      # shipped to prod). Staging images get promoted to prod via blue-green
      # swap, so this workflow is in-scope.
      # See .github/actions/verify-production-image/README.md
      - name: Verify production image (a1sb guard)
        uses: ./.github/actions/verify-production-image
        with:
          image-ref: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}@${{ steps.build.outputs.digest }}

      - name: Set image output
        id: set-output
        run: |
          IMAGE_FULL="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "image_full=${IMAGE_FULL}" >> $GITHUB_OUTPUT
          echo "Built: ${IMAGE_FULL}"

  # ===========================================================================
  # Job 4: Deploy — restart App Service (picks up new :staging tag from ACR)
  # ===========================================================================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-image
    environment:
      name: staging
      url: ${{ env.STAGING_URL }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set subscription context
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update container image and restart App Service
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pass GHCR credentials so App Service can pull the (internal) image.
          # Prefer GHCR_PAT (a long-lived PAT with read:packages scope) over
          # GITHUB_TOKEN, which expires after the workflow ends. Without a PAT,
          # App Service restarts outside CI may fail to re-pull the image.
          GHCR_PASSWORD="${GHCR_PAT:-$GITHUB_TOKEN}"
          az webapp config container set \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --container-image-name ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            --container-registry-url https://${{ env.GHCR_REGISTRY }} \
            --container-registry-user ${{ github.repository_owner }} \
            --container-registry-password "$GHCR_PASSWORD"
          az webapp restart \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

      - name: Wait for startup (90s)
        run: sleep 90

      - name: Health gate
        run: |
          STATUS=$(curl -sf ${{ env.STAGING_URL }}/health -w "%{http_code}" -o /dev/null)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Health check passed"

  # ===========================================================================
  # Job 5: Staging Validation — pytest suite against live URL
  # ===========================================================================
  validate:
    name: Staging Validation Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run staging validation suite
        run: |
          uv run pytest tests/staging/ \
            -v --tb=short \
            --staging-url="${{ env.STAGING_URL }}"
        env:
          STAGING_URL: ${{ env.STAGING_URL }}
          # Tests only make HTTP requests to the live URL; ENVIRONMENT=development
          # prevents Settings() from requiring CORS_ORIGINS during import.
          ENVIRONMENT: development

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-test-results
          path: staging-results.xml
