# =============================================================================
# Azure Governance Platform - Staging Deployment Pipeline
# =============================================================================
# Trigger: Pushes to 'staging' branch or manual workflow_dispatch
#
# Pipeline stages:
#   1. QA Gate       — lint + full unit/integration test suite (hard gate)
#   2. Security Scan — Trivy filesystem + pip-audit
#   3. Build Image   — az acr build → ACR (not GHCR; app service uses ACR)
#   4. Deploy        — az webapp restart picks up new :staging tag
#   5. Validation    — pytest staging suite against live URL
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID        — OIDC federated credential
#   AZURE_TENANT_ID        — HTT-CORE tenant
#   AZURE_SUBSCRIPTION_ID  — 32a28177-6fb2-4668-a528-6d6cafb9665e
# =============================================================================

name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip unit tests (emergency deploy only)'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  UV_VERSION:     '0.5.x'
  # ACR — must match what App Service is configured to pull from
  ACR_NAME:          acrgovstaging19859
  ACR_LOGIN_SERVER:  acrgovstaging19859.azurecr.io
  IMAGE_REPO:        azure-governance-platform
  IMAGE_TAG:         staging
  # App Service — actual resource names (verified 2026-03-18)
  AZURE_APP_NAME:       app-governance-staging-xnczpwyv
  AZURE_RESOURCE_GROUP: rg-governance-staging
  STAGING_URL:          https://app-governance-staging-xnczpwyv.azurewebsites.net

permissions:
  id-token: write        # OIDC login
  contents: read
  security-events: write # Trivy SARIF upload

jobs:
  # ===========================================================================
  # Job 1: QA Gate — hard gate, no continue-on-error
  # ===========================================================================
  qa-gate:
    name: QA Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}-v2

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Unit + integration tests
        if: ${{ inputs.skip_tests != 'true' }}
        run: uv run pytest tests/unit/ tests/integration/ -q --tb=short
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  # ===========================================================================
  # Job 2: Security Scan
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: qa-gate

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref:  '.'
          format:    'sarif'
          output:    'trivy-fs.sarif'
          severity:  'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category:   trivy-filesystem-staging

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc --format=json --output=pip-audit.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-staging
          path: pip-audit.json

  # ===========================================================================
  # Job 3: Build Docker Image → ACR
  # Builds directly in Azure via ACR Tasks — no local Docker required.
  # ===========================================================================
  build-image:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: [qa-gate, security-scan]

    outputs:
      image_full: ${{ steps.set-output.outputs.image_full }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set subscription context
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image via ACR Tasks
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}" \
            --image "${{ env.IMAGE_REPO }}:sha-${{ github.sha }}" \
            --platform linux/amd64 \
            --file Dockerfile \
            .

      - name: Set image output
        id: set-output
        run: |
          IMAGE_FULL="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}"
          echo "image_full=${IMAGE_FULL}" >> $GITHUB_OUTPUT
          echo "Built: ${IMAGE_FULL}"

  # ===========================================================================
  # Job 4: Deploy — restart App Service (picks up new :staging tag from ACR)
  # ===========================================================================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-image
    environment:
      name: staging
      url: ${{ env.STAGING_URL }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set subscription context
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Restart App Service (pulls new :staging image)
        run: |
          az webapp restart \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

      - name: Wait for startup (90s)
        run: sleep 90

      - name: Health gate
        run: |
          STATUS=$(curl -sf ${{ env.STAGING_URL }}/health -w "%{http_code}" -o /dev/null)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Health check passed"

  # ===========================================================================
  # Job 5: Staging Validation — pytest suite against live URL
  # ===========================================================================
  validate:
    name: Staging Validation Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run staging validation suite
        run: |
          uv run pytest tests/staging/ \
            -v --tb=short \
            --staging-url="${{ env.STAGING_URL }}"
        env:
          STAGING_URL: ${{ env.STAGING_URL }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-test-results
          path: staging-results.xml
