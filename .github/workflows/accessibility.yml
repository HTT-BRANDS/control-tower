name: Accessibility Testing

on:
  # Run after staging deploy or manually — requires a running app
  workflow_run:
    workflows: ["Deploy to Staging"]
    types: [completed]
  workflow_dispatch:

jobs:
  axe-core-check:
    name: Axe-core WCAG2AA Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli@4.11.1
      
      
      - name: Check staging is reachable
        run: |
          curl -sf https://app-governance-staging-xnczpwyv.azurewebsites.net/health || (echo "Staging not reachable" && exit 1)

      - name: Run axe-core scans against staging
        run: |
          mkdir -p test-results/axe
          axe https://app-governance-staging-xnczpwyv.azurewebsites.net \
            --tags wcag2a,wcag2aa,wcag22aa \
            --save test-results/axe/home.json || true
          axe https://app-governance-staging-xnczpwyv.azurewebsites.net/docs \
            --tags wcag2a,wcag2aa,wcag22aa \
            --save test-results/axe/docs.json || true
      
      - name: Upload axe results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: axe-accessibility-results
          path: test-results/axe/
          retention-days: 30

  pa11y-check:
    name: Pa11y Accessibility Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Pa11y
        run: npm install -g pa11y@9.1.1
      
      
      - name: Check staging is reachable
        run: |
          curl -sf https://app-governance-staging-xnczpwyv.azurewebsites.net/health || (echo "Staging not reachable" && exit 1)

      - name: Run Pa11y scans against staging
        run: |
          mkdir -p test-results/pa11y
          pa11y https://app-governance-staging-xnczpwyv.azurewebsites.net \
            --config tests/accessibility/pa11y-config.json \
            --reporter json > test-results/pa11y/home.json || true
          pa11y https://app-governance-staging-xnczpwyv.azurewebsites.net/docs \
            --config tests/accessibility/pa11y-config.json \
            --reporter json > test-results/pa11y/docs.json || true
      
      - name: Upload Pa11y results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pa11y-accessibility-results
          path: test-results/pa11y/
          retention-days: 30
