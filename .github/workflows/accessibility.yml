name: Accessibility Testing

on:
  # Run after staging deploy or manually — requires a running app
  workflow_run:
    workflows: ["Deploy to Staging"]
    types: [completed]
  workflow_dispatch:

env:
  STAGING_URL: https://app-governance-staging-xnczpwyv.azurewebsites.net

jobs:
  axe-core-check:
    name: Axe-core WCAG2AA Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install axe-core CLI and sync ChromeDriver
        run: |
          npm install -g @axe-core/cli@4.11.1
          npx browser-driver-manager install chrome
      
      - name: Check staging is reachable
        id: health-check
        run: |
          curl -sf ${{ env.STAGING_URL }}/health || (echo "::warning::Staging not reachable — skipping axe scans" && echo "reachable=false" >> $GITHUB_OUTPUT)
        continue-on-error: true

      - name: Run axe-core scans against staging
        if: steps.health-check.outputs.reachable != 'false'
        run: |
          mkdir -p test-results/axe
          PAGES=(
            "${{ env.STAGING_URL }}"
            "${{ env.STAGING_URL }}/login"
            "${{ env.STAGING_URL }}/docs"
          )
          EXIT_CODE=0
          for PAGE in "${PAGES[@]}"; do
            SLUG=$(echo "$PAGE" | sed 's|.*/||; s|^$|home|')
            echo "=== Scanning: $PAGE ==="
            axe "$PAGE" \
              --tags wcag2a,wcag2aa,wcag22aa \
              --save "test-results/axe/${SLUG}.json" || EXIT_CODE=1
          done
          # Fail the step if any scan found violations
          exit $EXIT_CODE
      
      - name: Upload axe results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: axe-accessibility-results
          path: test-results/axe/
          retention-days: 30

  playwright-axe:
    name: Playwright + axe-core E2E
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      
      - name: Setup Python 3.12
        run: uv python install 3.12
      
      - name: Install dependencies
        run: |
          uv sync --extra dev
          uv run playwright install chromium --with-deps
      
      - name: Run Playwright axe-core tests
        env:
          ENVIRONMENT: development
        run: |
          uv run pytest tests/e2e/test_axe_accessibility.py -v -x 2>&1 || true
      
      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: axe-failure-screenshots
          path: tests/e2e/screenshots/
          retention-days: 14

  pa11y-check:
    name: Pa11y Accessibility Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install Pa11y
        run: npm install -g pa11y@9.1.1
      
      - name: Check staging is reachable
        id: pa11y-health-check
        run: |
          curl -sf ${{ env.STAGING_URL }}/health || (echo "::warning::Staging not reachable — skipping Pa11y scans" && echo "reachable=false" >> $GITHUB_OUTPUT)
        continue-on-error: true

      - name: Run Pa11y scans against staging
        if: steps.pa11y-health-check.outputs.reachable != 'false'
        run: |
          mkdir -p test-results/pa11y
          pa11y ${{ env.STAGING_URL }} \
            --config tests/accessibility/pa11y-config.json \
            --reporter json > test-results/pa11y/home.json || true
          pa11y ${{ env.STAGING_URL }}/login \
            --config tests/accessibility/pa11y-config.json \
            --reporter json > test-results/pa11y/login.json || true
      
      - name: Upload Pa11y results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pa11y-accessibility-results
          path: test-results/pa11y/
          retention-days: 30
