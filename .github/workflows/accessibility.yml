name: Accessibility Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  axe-core-check:
    name: Axe-core WCAG2AA Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli@4.11.1
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync
      
      - name: Start FastAPI application
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health || exit 1
      
      - name: Run axe-core scans
        run: |
          mkdir -p test-results/axe
          axe http://localhost:8000 \
            --tags wcag2a,wcag2aa,wcag22aa \
            --save test-results/axe/home.json || true
          axe http://localhost:8000/docs \
            --tags wcag2a,wcag2aa,wcag22aa \
            --save test-results/axe/docs.json || true
      
      - name: Upload axe results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: axe-accessibility-results
          path: test-results/axe/
          retention-days: 30

  pa11y-check:
    name: Pa11y Accessibility Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Pa11y
        run: npm install -g pa11y@9.1.1
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync
      
      - name: Start FastAPI application
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health || exit 1
      
      - name: Run Pa11y scans
        run: |
          mkdir -p test-results/pa11y
          pa11y http://localhost:8000 \
            --config tests/accessibility/pa11y-config.json \
            --reporter json > test-results/pa11y/home.json || true
          pa11y http://localhost:8000/docs \
            --config tests/accessibility/pa11y-config.json \
            --reporter json > test-results/pa11y/docs.json || true
      
      - name: Upload Pa11y results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pa11y-accessibility-results
          path: test-results/pa11y/
          retention-days: 30
