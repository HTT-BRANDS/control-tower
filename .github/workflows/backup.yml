# Automated Database Backup Workflow
# Backs up database to Azure Blob Storage on schedule and on-demand

name: Database Backup

on:
  schedule:
    # Run daily at 2 AM UTC (off-peak hours)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Backup type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - schema-only
          - data-only
      environment:
        description: 'Environment to backup'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write # Required by azure/login@v2 OIDC federation.

env:
  PYTHON_VERSION: '3.12'
  BACKUP_RETENTION_DAYS: 30

jobs:
  backup:
    name: Database Backup (${{ github.event.inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ODBC Driver 18
        run: |
          curl -sSL -O https://packages.microsoft.com/config/ubuntu/24.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          pip install sqlalchemy alembic psycopg2-binary pyodbc azure-storage-blob azure-identity

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare storage authentication
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
        run: |
          storage_key=$(az storage account keys list \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --query '[0].value' \
            -o tsv)
          echo "::add-mask::$storage_key"
          echo "AZURE_STORAGE_KEY=$storage_key" >> "$GITHUB_ENV"

      - name: Create database backup
        id: backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_BACKUP_CONTAINER || 'database-backups' }}
          BACKUP_TYPE: ${{ github.event.inputs.backup_type || 'full' }}
        run: |
          python scripts/backup_database.py \
            --type "$BACKUP_TYPE" \
            --output backup.sql.gz

          # Upload to Azure Blob Storage
          python scripts/upload_backup.py \
            --file backup.sql.gz \
            --account "$AZURE_STORAGE_ACCOUNT" \
            --container "$AZURE_STORAGE_CONTAINER"

          echo "backup_file=backup.sql.gz" >> "$GITHUB_OUTPUT"
          echo "backup_size=$(stat -c%s backup.sql.gz)" >> "$GITHUB_OUTPUT"

      - name: Verify backup integrity
        run: |
          # Check if backup file is valid (not empty and can be decompressed)
          if [ ! -s backup.sql.gz ]; then
            echo "Error: Backup file is empty"
            exit 1
          fi

          # Try to decompress to verify integrity
          if ! gunzip -t backup.sql.gz 2>/dev/null; then
            echo "Error: Backup file is corrupted"
            exit 1
          fi

          echo "✓ Backup integrity verified"

      - name: Cleanup old backups
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_BACKUP_CONTAINER || 'database-backups' }}
        run: |
          python scripts/cleanup_backups.py \
            --account "$AZURE_STORAGE_ACCOUNT" \
            --container "$AZURE_STORAGE_CONTAINER" \
            --retention-days "$BACKUP_RETENTION_DAYS"

      # Teams notification — uses curl + MessageCard pattern matching
      # deploy-production.yml. Guarded by vars.TEAMS_WEBHOOK_CONFIGURED so
      # forks/dev environments without the webhook don't fail the workflow.
      # Replaced broken `mda590/teams-notify@master` action 2026-04-28 (bd fifh).
      - name: Notify Teams on success
        if: success() && vars.TEAMS_WEBHOOK_CONFIGURED == 'true'
        run: |
          curl -X POST "${{ secrets.PRODUCTION_TEAMS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"themeColor\": \"00a86b\",
              \"title\": \"✅ Database Backup Complete\",
              \"text\": \"**Environment:** ${{ github.event.inputs.environment || 'production' }}<br>**Backup Type:** ${{ github.event.inputs.backup_type || 'full' }}<br>**Backup Size:** ${{ steps.backup.outputs.backup_size }} bytes<br>**Retention:** ${{ env.BACKUP_RETENTION_DAYS }} days<br>**Run:** ${{ github.run_id }}\",
              \"potentialAction\": [{
                \"@type\": \"OpenUri\",
                \"name\": \"View Run\",
                \"targets\": [{\"os\": \"default\", \"uri\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]
              }]
            }" || true

      - name: Notify Teams on failure
        if: failure() && vars.TEAMS_WEBHOOK_CONFIGURED == 'true'
        run: |
          curl -X POST "${{ secrets.PRODUCTION_TEAMS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"themeColor\": \"d13438\",
              \"title\": \"❌ Database Backup Failed\",
              \"text\": \"**Environment:** ${{ github.event.inputs.environment || 'production' }}<br>**Run:** ${{ github.run_id }}<br>This is an RPO regression — investigate immediately.\",
              \"potentialAction\": [{
                \"@type\": \"OpenUri\",
                \"name\": \"View Run\",
                \"targets\": [{\"os\": \"default\", \"uri\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]
              }]
            }" || true

      - name: Upload backup artifact (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-backup-debug
          path: backup.sql.gz
          retention-days: 1

  backup-staging:
    name: Staging Database Backup
    if: github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ODBC Driver 18
        run: |
          curl -sSL -O https://packages.microsoft.com/config/ubuntu/24.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          pip install sqlalchemy alembic psycopg2-binary pyodbc azure-storage-blob azure-identity

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare storage authentication
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
        run: |
          storage_key=$(az storage account keys list \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --query '[0].value' \
            -o tsv)
          echo "::add-mask::$storage_key"
          echo "AZURE_STORAGE_KEY=$storage_key" >> "$GITHUB_ENV"

      - name: Create staging backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: staging-backups
        run: |
          python scripts/backup_database.py --type full --output staging-backup.sql.gz
          python scripts/upload_backup.py \
            --file staging-backup.sql.gz \
            --account "$AZURE_STORAGE_ACCOUNT" \
            --container "$AZURE_STORAGE_CONTAINER"

      - name: Cleanup old staging backups
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: staging-backups
        run: |
          python scripts/cleanup_backups.py \
            --account "$AZURE_STORAGE_ACCOUNT" \
            --container "$AZURE_STORAGE_CONTAINER" \
            --retention-days 7
