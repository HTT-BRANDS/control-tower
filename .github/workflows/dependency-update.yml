# =============================================================================
# Azure Governance Platform — Dependency Update Automation
# =============================================================================
# Weekly dependency maintenance:
#   1. Run pip-audit for security vulnerabilities
#   2. Check for outdated dependencies
#   3. Run `uv lock --upgrade` and open a real lockfile PR when updates exist
#   4. Create issues for major updates requiring manual review
#
# Schedule: Weekly on Sundays at 10:00 PM UTC (before Monday Dependabot run).
#
# NOTE: Dependabot's `pip` ecosystem does not update `uv.lock`, so its PRs can
# be no-ops for runtime. This workflow treats `uv.lock` as the source of truth.
# =============================================================================

name: Dependency Update Automation

on:
  schedule:
    # Run every Sunday at 10:00 PM UTC
    - cron: '0 22 * * 0'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write
  pull-requests: write
  issues: write
  security-events: write

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION: '0.9.27'
  ENVIRONMENT: development

jobs:
  # ===========================================================================
  # Job 1: Security Audit with pip-audit
  # ===========================================================================
  security-audit:
    name: Security Audit (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Export requirements from uv.lock
        run: uv export --no-hashes --no-dev > /tmp/requirements.txt

      - name: Run pip-audit
        id: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r /tmp/requirements.txt --format=json --output=pip-audit-results.json || true
          
          # Check if vulnerabilities were found
          VULN_COUNT=$(jq '[.dependencies[]?.vulns // empty | length] | add // 0' pip-audit-results.json)
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          
          # Create human-readable report
          pip-audit -r /tmp/requirements.txt --format=markdown --output=pip-audit-report.md || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: |
            pip-audit-results.json
            pip-audit-report.md
          retention-days: 30

      - name: Create issues for vulnerabilities
        if: steps.pip-audit.outputs.vuln_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditResults = JSON.parse(fs.readFileSync('pip-audit-results.json', 'utf8'));
            
            for (const dep of auditResults.dependencies || []) {
              if (dep.vulns && dep.vulns.length > 0) {
                for (const vuln of dep.vulns) {
                  const title = `Security: ${vuln.id || 'CVE'} in ${dep.name}`;
                  
                  // Check if issue already exists
                  const { data: issues } = await github.rest.issues.listForRepo({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    state: 'open',
                    labels: 'security,vulnerability'
                  });
                  
                  const exists = issues.some(i => i.title === title);
                  if (exists) continue;
                  
                  const body = [
                    '## Security Vulnerability Detected',
                    '',
                    `**Package:** ${dep.name}`,
                    `**Installed Version:** ${dep.version}`,
                    `**Vulnerability:** ${vuln.id || 'Unknown'}`,
                    `**Severity:** ${vuln.severity || 'Unknown'}`,
                    '',
                    '### Description',
                    vuln.description || 'No description available',
                    '',
                    '### Fix',
                    vuln.fix_versions ? `Update to: ${vuln.fix_versions.join(', ')}` : 'No fix version available',
                    '',
                    '### Links',
                    vuln.aliases ? vuln.aliases.map(a => `- ${a}`).join('\n') : 'N/A',
                    '',
                    '---',
                    '*This issue was automatically created by the dependency update automation workflow.*',
                  ].join('\n');
                  
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: title,
                    body: body,
                    labels: ['security', 'vulnerability', 'dependencies', 'priority-high']
                  });
                }
              }
            }

  # ===========================================================================
  # Job 2: Check for Outdated Dependencies
  # ===========================================================================
  outdated-check:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Export requirements
        run: uv export --no-hashes --no-dev > /tmp/requirements.txt

      - name: Check outdated dependencies
        id: outdated
        run: |
          pip install pip-outdated
          echo "## Outdated Dependencies" > outdated-report.md
          echo "" >> outdated-report.md
          echo "Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> outdated-report.md
          echo "" >> outdated-report.md
          
          pip-outdated --requirements-file /tmp/requirements.txt --format=markdown >> outdated-report.md || true
          
          # Check if any major updates exist
          MAJOR_COUNT=$(pip-outdated --requirements-file /tmp/requirements.txt --format=json 2>/dev/null | jq '[.[] | select(.latest_major != null)] | length' || echo "0")
          echo "major_count=$MAJOR_COUNT" >> $GITHUB_OUTPUT

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-report
          path: outdated-report.md
          retention-days: 30

      - name: Create issue for major updates
        if: steps.outdated.outputs.major_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('outdated-report.md', 'utf8');
            
            // Check if issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies,major-update'
            });
            
            const title = '📦 Major Dependency Updates Available';
            const exists = issues.some(i => i.title === title);
            if (exists) {
              console.log('Major update issue already exists');
              return;
            }
            
            const body = [
              '## Major Version Updates Available',
              '',
              'The following major version updates are available and require manual review:',
              '',
              report,
              '',
              '### Action Required',
              '1. Review each major update for breaking changes',
              '2. Test in staging environment',
              '3. Update code if breaking changes affect the project',
              '4. Merge Dependabot PRs or update manually',
              '',
              '---',
              '*This issue was automatically created by the dependency update automation workflow.*',
            ].join('\n');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['dependencies', 'major-update', 'manual-review']
            });

  # ===========================================================================
  # Job 3: Real uv.lock Upgrade PR
  # ===========================================================================
  uv-lock-upgrade:
    name: Open uv.lock Upgrade PR
    runs-on: ubuntu-latest
    needs: [security-audit]
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * 0'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Upgrade uv.lock
        run: uv lock --upgrade

      - name: Regenerate exported requirements files
        run: |
          set -euo pipefail

          # Do NOT redirect stderr into these files. `uv export` writes status
          # messages like "Resolved 144 packages in 3ms" to stderr; capturing
          # that output makes requirements.txt unparsable by pip/dependabot.
          uv export --no-hashes --no-dev > requirements.txt

          sed -n '1,15p' requirements-dev.txt > /tmp/requirements-dev-header.txt
          uv export --no-hashes --only-dev | sed -n '3,$p' > /tmp/requirements-dev-body.txt
          cat /tmp/requirements-dev-header.txt /tmp/requirements-dev-body.txt > requirements-dev.txt

          if grep -Eq '^Resolved [0-9]+ packages' requirements.txt requirements-dev.txt; then
            echo "uv status output leaked into requirements export" >&2
            exit 1
          fi

      - name: Check whether dependencies changed
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- uv.lock requirements.txt requirements-dev.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates available."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- uv.lock requirements.txt requirements-dev.txt
          fi

      - name: Smoke-test upgraded lockfile
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          uv sync --frozen
          uv run python - <<'PY'
          from app.main import app
          print(f"Loaded app with {len(app.routes)} routes")
          PY
          uv run pytest tests/unit/ -q --tb=short

      - name: Publish dependency update branch and issue
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_BRANCH: automation/uv-lock-upgrade
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$UPDATE_BRANCH"
          git add uv.lock requirements.txt requirements-dev.txt
          git commit -m "deps: weekly uv lock upgrade"
          # Dedicated automation branch; force-push is intentional so each
          # weekly run represents the latest lockfile refresh from current main.
          git push --force origin "$UPDATE_BRANCH"

          cat > /tmp/uv-lock-upgrade-issue.md <<EOF
          ## Summary

          Weekly dependency maintenance generated by \`dependency-update.yml\`.

          A real \`uv.lock\` update is ready on branch:

          - \`$UPDATE_BRANCH\`
          - https://github.com/${{ github.repository }}/compare/main...$UPDATE_BRANCH

          This is the real Python dependency update path for this repo:
          - \`uv.lock\` is upgraded via \`uv lock --upgrade\`
          - \`requirements.txt\` is regenerated from \`uv.lock\`
          - \`requirements-dev.txt\` is regenerated from \`uv.lock\`

          Dependabot's \`pip\` ecosystem does not update \`uv.lock\`, so its PRs
          can be no-ops for runtime. Review this branch diff instead.

          ## Validation run by workflow

          - \`uv sync --frozen\`
          - app import smoke (\`from app.main import app\`)
          - \`uv run pytest tests/unit/ -q --tb=short\`

          Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## Reviewer notes

          Watch for major bumps in runtime-sensitive packages (Azure SDK,
          \`cryptography\`, FastAPI/Pydantic/Uvicorn). If the diff is safe,
          open/merge a PR manually or cherry-pick the branch into \`main\`.

          Optional admin follow-up: enable the repo/org setting "Allow GitHub
          Actions to create and approve pull requests" if we want this workflow
          to create PRs directly instead of branch+issue handoff.
          EOF

          existing_issue=$(gh issue list \
            --state open \
            --search "Weekly uv.lock upgrade ready in:title" \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --body-file /tmp/uv-lock-upgrade-issue.md
            echo "Updated existing uv.lock upgrade issue #$existing_issue"
          else
            gh issue create \
              --title "Weekly uv.lock upgrade ready" \
              --body-file /tmp/uv-lock-upgrade-issue.md
          fi

  # ===========================================================================
  # Job 4: Dependency Summary Report
  # ===========================================================================
  summary:
    name: Generate Summary Report
    runs-on: ubuntu-latest
    needs: [security-audit, outdated-check]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create summary
        run: |
          echo "## 📊 Dependency Update Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f pip-audit-results/pip-audit-report.md ]; then
            echo "### 🔒 Security Audit Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat pip-audit-results/pip-audit-report.md >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f outdated-report/outdated-report.md ]; then
            echo "### 📦 Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
            cat outdated-report/outdated-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify if issues found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Dependency Update Workflow Failed - ${new Date().toISOString().split('T')[0]}`,
              body: [
                '## Workflow Failure',
                '',
                `The dependency update automation workflow failed. Please check the [workflow logs](${context.payload.repository.html_url}/actions/runs/${context.runId}).`,
                '',
                '### Possible Causes',
                '- pip-audit installation failure',
                '- Network issues',
                '- Repository permission issues',
                '',
                '---',
                '*This issue was automatically created.*',
              ].join('\n'),
              labels: ['dependencies', 'ci-cd', 'priority-medium']
            });
