# =============================================================================
# Blue-Green Deployment Workflow
# Deploys to staging slot, validates, then swaps to production
# Includes automatic rollback on validation failure
# =============================================================================
name: Blue-Green Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      skip_validation:
        description: 'Skip pre-swap validation (dangerous)'
        required: false
        default: false
        type: boolean
      container_tag:
        description: 'Container image tag to deploy'
        required: false
        default: 'latest'
        type: string

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Build and push container image
  # ---------------------------------------------------------------------------
  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.inputs.container_tag || 'latest' }}
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # CRITICAL: target the production stage. Without this, buildx defaults
          # to the LAST stage in the Dockerfile (currently `development`),
          # producing a dev image with no ODBC libs and uvicorn --reload.
          # See: a1sb (2026-04-17) — prod was running dev image for weeks.
          target: production
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ---------------------------------------------------------------------------
  # Deploy to staging slot
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging Slot
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}-staging
      url: ${{ steps.deploy.outputs.staging_url }}
    outputs:
      staging_url: ${{ steps.deploy.outputs.staging_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure staging slot exists
        run: |
          az webapp deployment slot list \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?name=='staging']" \
            --output tsv | grep -q "staging" || \
          az webapp deployment slot create \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --slot staging \
            --configuration-source ${{ env.AZURE_WEBAPP_NAME }}

      - name: Deploy to staging slot
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: staging
          images: ${{ needs.build.outputs.image_tag }}

      - name: Set staging URL output
        id: url
        run: |
          STAGING_URL="https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
          echo "staging_url=$STAGING_URL" >> $GITHUB_OUTPUT
          echo "Staging URL: $STAGING_URL"

      - name: Wait for slot startup
        run: |
          echo "Waiting for staging slot to start..."
          sleep 30
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging slot is healthy"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, waiting..."
            sleep 15
          done
          echo "❌ Staging slot failed to start"
          exit 1

  # ---------------------------------------------------------------------------
  # Validate staging slot before swap
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Staging Slot
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      contents: read
      id-token: write
    if: ${{ !github.event.inputs.skip_validation }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run pre-swap validation
        run: |
          chmod +x scripts/validate-slot.sh
          ./scripts/validate-slot.sh \
            "${{ env.AZURE_WEBAPP_NAME }}" \
            "${{ env.RESOURCE_GROUP }}" \
            "staging"
        env:
          STAGING_URL: ${{ needs.deploy-staging.outputs.staging_url }}

      - name: Run smoke tests against staging
        run: |
          echo "Running smoke tests against staging..."
          STAGING_URL="https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
          
          # Test health endpoint
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health")
          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "❌ Health check failed: $HEALTH_STATUS"
            exit 1
          fi
          echo "✅ Health check passed"
          
          # Test API readiness
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health")
          if [ "$API_STATUS" != "200" ]; then
            echo "❌ API health check failed: $API_STATUS"
            exit 1
          fi
          echo "✅ API health check passed"
          
          # Test static assets
          STATIC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/static/css/theme.css")
          if [ "$STATIC_STATUS" != "200" ]; then
            echo "⚠️ Static assets may have issues: $STATIC_STATUS"
          else
            echo "✅ Static assets accessible"
          fi
          
          echo "🎉 All validation checks passed!"

  # ---------------------------------------------------------------------------
  # Swap slots (staging -> production)
  # ---------------------------------------------------------------------------
  swap:
    name: Swap to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, validate]
    permissions:
      contents: read
      id-token: write
    if: always() && needs.deploy-staging.result == 'success' && (needs.validate.result == 'success' || github.event.inputs.skip_validation)
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}-production
      url: ${{ steps.swap.outputs.production_url }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Perform slot swap
        id: swap
        run: |
          echo "Initiating slot swap..."
          az webapp deployment slot swap \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --slot staging \
            --target-slot production \
            --action swap
          
          PROD_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "production_url=$PROD_URL" >> $GITHUB_OUTPUT
          echo "✅ Swap completed successfully"

      - name: Verify production health
        run: |
          PROD_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          sleep 10
          
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production is healthy after swap"
              exit 0
            fi
            echo "Verification attempt $i: Status $STATUS"
            sleep 10
          done
          
          echo "⚠️ Production health check inconclusive, check manually"

  # ---------------------------------------------------------------------------
  # Rollback on failure
  # ---------------------------------------------------------------------------
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-staging, validate, swap]
    permissions:
      contents: read
      id-token: write
    if: always() && needs.swap.result == 'failure'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Emergency rollback
        run: |
          echo "🚨 Swap failed! Initiating rollback..."
          
          # Swap back to restore previous production
          az webapp deployment slot swap \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --slot staging \
            --target-slot production \
            --action swap
          
          echo "✅ Rollback completed - previous production version restored"
          
          # Stop staging slot to prevent serving bad version
          az webapp stop \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --slot staging
          
          echo "🛑 Staging slot stopped"

      - name: Notify failure
        run: |
          echo "::error::Blue-green deployment failed and was rolled back"
          # Could integrate with Teams/Slack here

  # ---------------------------------------------------------------------------
  # Cleanup and notifications
  # ---------------------------------------------------------------------------
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [build, deploy-staging, validate, swap]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "=== Deployment Summary ==="
          echo "Build: ${{ needs.build.result }}"
          echo "Deploy Staging: ${{ needs.deploy-staging.result }}"
          echo "Validate: ${{ needs.validate.result }}"
          echo "Swap: ${{ needs.swap.result }}"
          echo "==========================="
          
          if [ "${{ needs.swap.result }}" = "success" ]; then
            echo "🎉 Blue-green deployment completed successfully!"
          elif [ "${{ needs.swap.result }}" = "failure" ]; then
            echo "❌ Deployment failed - check rollback job"
          else
            echo "⚠️ Deployment status unclear"
          fi
