name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/audit_output.json'
      - 'scripts/render_status.py'
      - 'riverside-security-requirements/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render audit status into docs/status.md
        run: python scripts/render_status.py || true

      - name: Refresh bundled OpenAPI spec for /api/swagger/
        # Public endpoint, no auth needed. Non-fatal: if prod is down,
        # the previously-committed snapshot ships instead.
        run: |
          mkdir -p docs/api/swagger
          if curl -fsSL --max-time 15 \
              https://app-governance-prod.azurewebsites.net/openapi.json \
              -o docs/api/swagger/openapi.json; then
            echo "Refreshed openapi.json: $(wc -c < docs/api/swagger/openapi.json) bytes"
          else
            echo "WARN: openapi.json refresh failed; using committed snapshot"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
