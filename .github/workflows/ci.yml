# =============================================================================
# Azure Governance Platform — CI Pipeline
# =============================================================================
# Runs on every push to main and on PRs. Lint, test, security scan.
# Does NOT build Docker images or deploy — that's handled by:
#   - deploy-staging.yml  (push to main → staging)
#   - deploy-production.yml (manual dispatch → production)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION: '0.5.x'
  ENVIRONMENT: development
  BROWSER_SMOKE_URL: http://127.0.0.1:8099

jobs:
  # ===========================================================================
  # Job 1: Lint & Test
  # ===========================================================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}-v2

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Unit & integration tests
        run: uv run pytest tests/unit/ tests/integration/ -q --tb=short

  # ===========================================================================
  # Job 2: Browser Smoke (required merge gate)
  # ===========================================================================
  browser-smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15
    env:
      ENVIRONMENT: test
      E2E_HARNESS: '1'
      BROWSER_TEST_DISABLE_SCHEDULERS: 'true'
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/ms-playwright
          key: browser-smoke-${{ runner.os }}-${{ hashFiles('uv.lock') }}-playwright-1.58.0-v1

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Install pinned Playwright browser runtime
        run: uv run playwright install chromium --with-deps

      - name: Prepare artifact directories
        run: |
          rm -rf tests/e2e/screenshots artifacts/browser-smoke
          mkdir -p tests/e2e/screenshots artifacts/browser-smoke

      - name: Start browser smoke app harness
        run: |
          uv run python -m uvicorn app.main:app \
            --host 127.0.0.1 \
            --port 8099 \
            --log-level warning \
            > artifacts/browser-smoke/app.log 2>&1 &
          echo "BROWSER_SMOKE_APP_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for app readiness
        run: |
          uv run python scripts/wait_for_url.py \
            "${{ env.BROWSER_SMOKE_URL }}/api/v1/health" \
            --timeout 45 \
            --interval 1 \
            --expect-status 200

      - name: Run focused browser smoke suite
        run: |
          uv run python -m pytest tests/e2e/test_browser_smoke.py -q --tb=short \
            2>&1 | tee artifacts/browser-smoke/pytest.log

      - name: Upload sanitized browser-smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-failure-artifacts
          path: |
            artifacts/browser-smoke/app.log
            artifacts/browser-smoke/pytest.log
            tests/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Browser smoke gate note
        if: always()
        run: |
          echo "## Browser smoke gate status" >> "$GITHUB_STEP_SUMMARY"
          echo "- Current mode: blocking CI gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- Expected merge protection: require the Browser Smoke check on main" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact policy: failure-only screenshots + concise logs; no cookies, storage-state, auth headers, or traces" >> "$GITHUB_STEP_SUMMARY"

      - name: Stop browser smoke app harness
        if: always()
        run: |
          if [ -n "${BROWSER_SMOKE_APP_PID:-}" ] && kill -0 "$BROWSER_SMOKE_APP_PID" 2>/dev/null; then
            kill "$BROWSER_SMOKE_APP_PID"
          fi

  # ===========================================================================
  # Job 3: Security Scan
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: pip-audit
        run: |
          # Export locked deps (no hashes — pip-audit doesn't support them)
          uv export --no-hashes --no-dev > /tmp/requirements.txt
          pip install pip-audit
          pip-audit -r /tmp/requirements.txt --desc --format=json --output=pip-audit-results.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json
