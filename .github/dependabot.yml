# =============================================================================
# Azure Governance Platform — Dependabot Configuration
# =============================================================================
# Automated dependency updates with grouped updates to reduce noise.
# Major version updates require manual review (security critical).
#
# Schedule: Weekly on Mondays at 9:00 AM UTC
# =============================================================================

version: 2
updates:
  # ---------------------------------------------------------------------------
  # Python Dependencies (pip)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "tygranlund"
    labels:
      - "dependencies"
      - "python"
      - "security"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Group minor and patch updates to reduce PR noise
      minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Security updates get their own group
      security:
        applies-to: "security-updates"
        patterns:
          - "*"
    ignore:
      # Ignore major version updates - require manual review for security
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    # Allow up to 5 concurrent checks
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # ---------------------------------------------------------------------------
  # GitHub Actions
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "tygranlund"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Docker Images
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    reviewers:
      - "tygranlund"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    commit-message:
      prefix: "docker"
      include: "scope"
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Python Dependencies for Scripts Directory
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
      - "scripts"
    groups:
      scripts:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
