# GitHub Pages Configuration for Azure Governance Platform
title: Azure Governance Platform
subtitle: Technical Architecture & Operations Guide
version: 1.8.1
description: >-
  Comprehensive technical documentation for the Azure Governance Platform.
  Architecture, deployment, operations, and API reference.

# GitHub metadata (auto-populated by GitHub)
github_username: HTT-BRANDS
repository_name: azure-governance-platform

# Build settings
# theme removed - using custom layouts
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false

# Disable Liquid processing to avoid conflicts with code examples
liquid:
  render_with_liquid: false

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Exclude files from processing
exclude:
  - "scripts/"
  - "tests/"
  - "infrastructure/terraform/"
  - ".git/"
  - ".github/"
  - "Makefile"
  - "*.py"
  - "*.sh"
  - "requirements.txt"
  - "pyproject.toml"
  - "Gemfile"
  - "Gemfile.lock"
  - "decisions/adr-template.md"
  - "openapi-examples/"
  - "security/mcp-trust-audit.md"
  - "design-system.md"

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

