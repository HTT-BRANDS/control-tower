<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Riverside Capital PE Governance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <!-- Design System (ADR-0005) -->
    <link rel="stylesheet" href="/static/css/design-tokens.css">
    <link rel="stylesheet" href="/static/css/tailwind-output.css">
    <link rel="stylesheet" href="/static/css/design-utilities.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-surface-secondary font-sans">
    <div class="max-w-md w-full mx-4" data-testid="login-shell">
        <div class="bg-white rounded-lg shadow-md p-8">
            <!-- Logo / Branding -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4 bg-brand-primary">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-brand-primary">
                    Riverside Capital
                </h1>
                <p class="text-sm mt-1 text-muted-theme">
                    PE Governance Platform
                </p>
            </div>

            <!-- Azure AD SSO Button (Primary for staging/production) -->
            <div id="azure-login-section" data-testid="login-azure-entry">
                <button id="azure-login-btn" type="button"
                        class="w-full flex justify-center items-center gap-3 py-2.5 px-4 rounded-md text-sm font-semibold text-white transition-colors bg-brand-primary-100 hover:bg-brand-primary-110"
                        >
                    <svg width="20" height="20" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
                    </svg>
                    <span id="azure-btn-text">Sign in with Microsoft</span>
                    <svg id="azure-btn-spinner" class="hidden animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>

            <!-- Divider (shown when dev login is available) -->
            <div id="divider" class="hidden my-6 flex items-center">
                <div class="flex-grow border-t border-default"></div>
                <span class="px-3 text-xs text-muted-theme">or</span>
                <div class="flex-grow border-t border-default"></div>
            </div>

            <!-- Dev Login Form (only shown in development) -->
            <form id="login-form" class="space-y-5 hidden" data-testid="login-dev-form">
                <div>
                    <label for="username" class="block text-sm font-medium text-secondary-theme">Username</label>
                    <input type="text" id="username" name="username" required
                           class="mt-1 block w-full rounded-md border px-3 py-2 text-sm focus-visible:ring-2 focus-visible:ring-offset-1 border-default"
                           placeholder="Enter username">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-secondary-theme">Password</label>
                    <input type="password" id="password" name="password" required
                           class="mt-1 block w-full rounded-md border px-3 py-2 text-sm focus-visible:ring-2 focus-visible:ring-offset-1 border-default"
                           placeholder="Enter password">
                </div>

                <button type="submit" id="submit-btn"
                        class="w-full flex justify-center items-center gap-2 py-2.5 px-4 rounded-md text-sm font-semibold text-white transition-colors bg-brand-primary hover:bg-brand-primary-110">
                    <span id="btn-text">Sign In</span>
                    <svg id="btn-spinner" class="hidden animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <div id="error-message" data-testid="login-error-message" class="text-sm hidden rounded-md px-3 py-2 mt-4 text-brand-error bg-brand-error-5"></div>

            <div class="mt-6 text-center">
                <p class="text-xs text-muted-theme">Access restricted to authorized users</p>
            </div>
        </div>

        <p class="text-center text-xs mt-4 text-muted-theme">
            Azure Governance Platform v{{ app_version }}
        </p>
    </div>

    <script nonce="{{ request.state.csp_nonce }}">
        const errorDiv = document.getElementById('error-message');

// ── PKCE helpers ─────────────────────────────────────────
        function generateCodeVerifier() {
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            return base64URLEncode(array);
        }
        
        function base64URLEncode(str) {
            return btoa(String.fromCharCode.apply(null, str))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=/g, '');
        }
        
        async function generateCodeChallenge(verifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return base64URLEncode(new Uint8Array(digest));
        }



        // ── Azure AD SSO ────────────────────────────────────────
        async function signInWithAzureAD() {
            const btn = document.getElementById('azure-login-btn');
            const btnText = document.getElementById('azure-btn-text');
            const spinner = document.getElementById('azure-btn-spinner');
            btnText.textContent = 'Redirecting...';
            spinner.classList.remove('hidden');
            btn.disabled = true;

            try {
                const resp = await fetch('/api/v1/auth/azure/login');
                const config = await resp.json();

                if (!config.client_id || !config.authorization_endpoint) {
                    throw new Error('Azure AD not configured');
                }

                // Generate PKCE parameters
                const codeVerifier = generateCodeVerifier();
                const codeChallenge = await generateCodeChallenge(codeVerifier);
                sessionStorage.setItem('pkce_code_verifier', codeVerifier);

                // Generate and store OAuth state for CSRF protection
                const oauthState = crypto.randomUUID();
                sessionStorage.setItem('oauth_state', oauthState);

                // Build authorization URL
                const params = new URLSearchParams({
                    client_id: config.client_id,
                    response_type: 'code',
                    redirect_uri: window.location.origin + '/login',
                    scope: config.scopes || 'openid profile email User.Read',
                    response_mode: 'query',
                    state: oauthState,
                    code_challenge: codeChallenge,
                    code_challenge_method: 'S256'
                });

                window.location.href = config.authorization_endpoint + '?' + params.toString();
            } catch (err) {
                console.error('Azure AD redirect failed:', err);
                errorDiv.textContent = 'Azure AD sign-in unavailable. ' + err.message;
                errorDiv.classList.remove('hidden');
                btnText.textContent = 'Sign in with Microsoft';
                spinner.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // ── Handle OAuth callback (code in URL) ────────────────
        async function handleOAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const returnedState = params.get('state');
            if (!code) return false;

            // Validate OAuth state parameter (CSRF protection)
            const expectedState = sessionStorage.getItem('oauth_state');
            if (!expectedState || !returnedState || returnedState !== expectedState) {
                console.error('OAuth state mismatch — possible CSRF attack');
                errorDiv.textContent = 'Security validation failed. Please try signing in again.';
                errorDiv.classList.remove('hidden');
                sessionStorage.removeItem('oauth_state');
                return false;
            }
            sessionStorage.removeItem('oauth_state');

            // Clean the URL
            window.history.replaceState({}, document.title, '/login');

            const btn = document.getElementById('azure-login-btn');
            const btnText = document.getElementById('azure-btn-text');
            const spinner = document.getElementById('azure-btn-spinner');
            btnText.textContent = 'Completing sign-in...';
            spinner.classList.remove('hidden');
            btn.disabled = true;

            try {
                // Retrieve PKCE code_verifier
                const codeVerifier = sessionStorage.getItem('pkce_code_verifier');
                if (!codeVerifier) {
                    throw new Error('PKCE code verifier missing. Please try signing in again.');
                }

                const resp = await fetch('/api/v1/auth/azure/callback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: code,
                        redirect_uri: window.location.origin + '/login',
                        code_verifier: codeVerifier,
                        state: returnedState
                    })
                });

                if (resp.ok) {
                    // Clear PKCE verifier on success
                    sessionStorage.removeItem('pkce_code_verifier');
                    const data = await resp.json();
                    // Server sets HttpOnly cookies — no client-side token storage needed
                    window.location.href = '/dashboard';
                    return true;
                } else {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || 'Authentication failed');
                }
            } catch (err) {
                console.error('OAuth callback error:', err);
                errorDiv.textContent = err.message || 'Sign-in failed. Please try again.';
                errorDiv.classList.remove('hidden');
                btnText.textContent = 'Sign in with Microsoft';
                spinner.classList.add('hidden');
                btn.disabled = false;
                return false;
            }
        }

        // ── Dev login form handler ──────────────────────────────
        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            btnText.textContent = 'Signing in...';
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const formData = new URLSearchParams();
                formData.append('username', document.getElementById('username').value);
                formData.append('password', document.getElementById('password').value);

                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    // Server sets HttpOnly cookies — no client-side token storage needed
                    window.location.href = '/dashboard';
                } else {
                    const err = await response.json().catch(() => ({}));
                    errorDiv.textContent = err.detail || 'Invalid credentials';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Login failed. Please try again.';
                errorDiv.classList.remove('hidden');
            } finally {
                btnText.textContent = 'Sign In';
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        // Hover effects
        const azureBtn = document.getElementById('azure-login-btn');
        // Hover colors handled via CSS classes (no inline JS needed)
        azureBtn.addEventListener('click', signInWithAzureAD);

        // ── Page Init ───────────────────────────────────────────
        (async () => {
            // Check for OAuth callback first
            if (await handleOAuthCallback()) return;

            // Detect dev mode from /health endpoint (no auth, no rate limit cost)
            try {
                const resp = await fetch('/health');
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.environment === 'development') {
                        document.getElementById('login-form').classList.remove('hidden');
                        document.getElementById('divider').classList.remove('hidden');
                        document.getElementById('divider').style.display = 'flex';
                    }
                }
            } catch (e) {
                // Azure AD only — don't show dev form
            }
        })();
    </script>
</body>
</html>
